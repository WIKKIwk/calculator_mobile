# .ipa fayl (Payload/Runner.app) — GitHub Secrets / Apple sertifikati SHART EMAS.
# Qurilmaga o'rnatish uchun keyin o'zingiz imzolashingiz kerak bo'lishi mumkin
# (Apple qoidalari shunday); lekin CI faqat .ipa konteynerini yig'adi.

name: mobile_offline iOS IPA (sertifikatsiz)

on:
  push:
    paths:
      - 'mobile_offline/**'
      - '.github/workflows/build-mobile-offline-ios.yml'
  workflow_dispatch:

concurrency:
  group: mobile-offline-ios-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-ipa-payload:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: pub get
        working-directory: mobile_offline
        run: flutter pub get

      - name: iOS release (imzo talab qilmaydi)
        working-directory: mobile_offline
        run: flutter build ios --release --no-codesign

      - name: .ipa (Payload tuzilishi)
        run: |
          set -euo pipefail
          APP="$(find "${{ github.workspace }}/mobile_offline/build/ios" -type d -name 'Runner.app' | head -1)"
          if [[ -z "$APP" ]]; then
            echo "Runner.app topilmadi:"
            find "${{ github.workspace }}/mobile_offline/build/ios" -type d -maxdepth 5 2>/dev/null || true
            exit 1
          fi
          echo "App: $APP"
          WORK="${{ github.workspace }}/mobile_offline/build/ios/ipa-staging"
          rm -rf "$WORK"
          mkdir -p "$WORK/Payload"
          cp -R "$APP" "$WORK/Payload/"
          mkdir -p "${{ github.workspace }}/upload-ipa"
          SHORT="${GITHUB_SHA:0:7}"
          OUT="${{ github.workspace }}/upload-ipa/hisoblagich-offline-${SHORT}.ipa"
          (cd "$WORK" && zip -rq "$OUT" Payload)
          ls -lh "$OUT"
          unzip -l "$OUT" | head -20

      - name: Artifact (.ipa)
        uses: actions/upload-artifact@v4
        with:
          name: hisoblagich-offline-ipa-${{ github.sha }}
          path: upload-ipa/*.ipa
          if-no-files-found: error
