# .ipa — imzo/sertifikat yo'q; Payload/Runner.app zip (o'rnatish uchun keyin imzolash mumkin).
name: mobile_offline iOS IPA

on:
  push:
    paths:
      - 'mobile_offline/**'
      - '.github/workflows/build-mobile-offline-ios.yml'
  workflow_dispatch:

concurrency:
  group: mobile-offline-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ipa:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: pub get
        working-directory: mobile_offline
        run: flutter pub get

      - name: iOS release (--no-codesign)
        working-directory: mobile_offline
        run: flutter build ios --release --no-codesign

      - name: .ipa (Payload)
        run: |
          set -euo pipefail
          APP="$(find "${GITHUB_WORKSPACE}/mobile_offline/build/ios" -type d -name 'Runner.app' | head -1)"
          if [[ -z "$APP" ]]; then
            find "${GITHUB_WORKSPACE}/mobile_offline/build/ios" -type d -maxdepth 8 2>/dev/null || true
            exit 1
          fi
          WORK="${GITHUB_WORKSPACE}/mobile_offline/build/ios/ipa-staging"
          rm -rf "$WORK"
          mkdir -p "$WORK/Payload"
          cp -R "$APP" "$WORK/Payload/"
          mkdir -p "${GITHUB_WORKSPACE}/upload-ipa"
          OUT="${GITHUB_WORKSPACE}/upload-ipa/hisoblagich-offline-${GITHUB_SHA:0:7}.ipa"
          (cd "$WORK" && zip -rq "$OUT" Payload)
          ls -lh "$OUT"

      - uses: actions/upload-artifact@v4
        with:
          name: hisoblagich-offline-ipa-${{ github.run_number }}
          path: upload-ipa/*.ipa
          if-no-files-found: error
