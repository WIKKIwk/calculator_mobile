# Windows: Inno Setup — bitta o'rnatuvchi .exe (Start menyu + Ilovalar ro'yxati, Desktop emas).
name: mobile_offline Windows

on:
  push:
    paths:
      - 'mobile_offline/**'
      - '.github/workflows/build-mobile-offline-windows.yml'
  workflow_dispatch:

concurrency:
  group: mobile-offline-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-release:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: pub get
        working-directory: mobile_offline
        run: flutter pub get

      - name: Build Windows (Release)
        working-directory: mobile_offline
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          $candidates = @(
            (Join-Path $env:ProgramFiles "Inno Setup 6\ISCC.exe"),
            (Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe")
          )
          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe topilmadi." }
          $iss = Join-Path $env:GITHUB_WORKSPACE "mobile_offline\windows\installer\hisoblagich_offline.iss"
          & $iscc $iss
          Get-ChildItem -Recurse (Join-Path $env:GITHUB_WORKSPACE "mobile_offline\build\installer_out")

      - name: Copy artifact to repo root
        shell: pwsh
        run: |
          Copy-Item -Force `
            (Join-Path $env:GITHUB_WORKSPACE "mobile_offline\build\installer_out\hisoblagich-offline-setup.exe") `
            (Join-Path $env:GITHUB_WORKSPACE "hisoblagich-offline-setup.exe")

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: hisoblagich-offline-${{ github.run_number }}
          path: hisoblagich-offline-setup.exe
          if-no-files-found: error
