# Windows: flutter build + Inno Setup — artifact bitta o'rnatuvchi .exe (hamma DLL/data ichida).
name: mobile_offline Windows

on:
  push:
    paths:
      - 'mobile_offline/**'
      - '.github/workflows/build-mobile-offline-windows.yml'
  workflow_dispatch:

concurrency:
  group: mobile-offline-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-release:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: pub get
        working-directory: mobile_offline
        run: flutter pub get

      - name: Build Windows (Release)
        working-directory: mobile_offline
        run: flutter build windows --release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build single-file installer (.exe)
        shell: pwsh
        run: |
          $candidates = @(
            (Join-Path $env:ProgramFiles "Inno Setup 6\ISCC.exe"),
            (Join-Path ${env:ProgramFiles(x86)} "Inno Setup 6\ISCC.exe")
          )
          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { throw "ISCC.exe topilmadi (Inno Setup o'rnatilmagan)." }
          Write-Host "Using $iscc"
          $iss = Join-Path $env:GITHUB_WORKSPACE "mobile_offline\windows\installer\hisoblagich_offline.iss"
          & $iscc $iss
          $out = Join-Path $env:GITHUB_WORKSPACE "mobile_offline\build\installer_out"
          Get-ChildItem -Recurse $out | Select-Object FullName, Length

      - name: Upload installer (bitta fayl)
        uses: actions/upload-artifact@v4
        with:
          name: hisoblagich-offline-setup-${{ github.run_number }}-${{ github.sha }}
          path: mobile_offline/build/installer_out/hisoblagich-offline-setup.exe
          if-no-files-found: error
